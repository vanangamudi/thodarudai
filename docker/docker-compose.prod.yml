version: "3.8"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: thodarudai
      POSTGRES_USER: thodarudai
      POSTGRES_PASSWORD: thodarudai
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    environment:
      STORAGE_BACKEND: postgres
      POSTGRES_DSN: postgresql://thodarudai:thodarudai@postgres:5432/thodarudai
      PROFILE: default
      BASE_DIR: /data
      CORS_ORIGINS: http://localhost:5173
      CORS_ORIGINS: http://localhost:8080
    depends_on:
      postgres:
        condition: service_started
    volumes:
      - ./data:/data:rw

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_BASE: http://localhost:8000
    ports:
      - "8080:80"
    depends_on:
      web:
        condition: service_started

volumes:
  pgdata:
