version: "3.8"
services:
  postgres:
    image: postgres:16
    container_name: thodarudai-postgres
    environment:
      POSTGRES_DB: thodarudai
      POSTGRES_USER: thodarudai
      POSTGRES_PASSWORD: thodarudai
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
volumes:
  pgdata:
